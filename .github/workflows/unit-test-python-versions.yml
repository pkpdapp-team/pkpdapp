name: Unit tests (python versions)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/coverage-test.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: install sundials
        run: |
          sudo apt-get update
          sudo apt-get install libsundials-dev libsasl2-dev python3-dev libldap2-dev libssl-dev

      - name: install pkpdapp
        run: |
          python --version
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: run unit tests
        run: |
          cd pkpdapp && python manage.py test
